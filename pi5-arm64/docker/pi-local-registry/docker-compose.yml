
version: "3.8"

networks:
  internal:
    external: true

services:
  registry:
    image: registry:2
    container_name: local-registry
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - ./data:/var/lib/registry
      - ./config.yml:/etc/docker/registry/config.yml
    command: ["registry", "serve", "/etc/docker/registry/config.yml"]
    labels:
      - "traefik.enable=true"

      # --------------------------
      # Internal Router
      # --------------------------
      - "traefik.http.routers.registry-internal.rule=Host(`${REGISTRY_INTERNAL_HOST}`)"
      - "traefik.http.routers.registry-internal.entrypoints=websecure"
      - "traefik.http.routers.registry-internal.tls=true"
      - "traefik.http.routers.registry-internal.middlewares=registry-auth"
      - "traefik.http.routers.registry-internal.tls.certresolver=myresolver"

      # --------------------------
      # External Router
      # --------------------------
      - "traefik.http.routers.registry-external.rule=Host(`${REGISTRY_EXTERNAL_HOST}`)"
      - "traefik.http.routers.registry-external.entrypoints=websecure"
      - "traefik.http.routers.registry-external.tls.certresolver=myresolver"
      - "traefik.http.routers.registry-external.middlewares=registry-auth" # ✅ Add authentication middleware

      # --------------------------
      # Basic Auth Middleware (shared)
      # --------------------------
      - "traefik.http.middlewares.registry-auth.basicauth.users=${REGISTRY_AUTH}"

      # --------------------------
      # Shared Service
      # --------------------------
      - "traefik.http.services.registry-internal.loadbalancer.server.port=5000"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.12"
          memory: 128M

  registry-cleaner:
    image: alpine:3.19
    container_name: registry-cleaner
    depends_on:
      - registry
    networks:
      - internal
    volumes:
      - ./cleanup-registry.sh:/cleanup.sh
      - ./config.yml:/etc/docker/registry/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: >
      sh -c "
      apk add --no-cache curl jq bash docker-cli &&
      while true; do
        echo 'Running registry cleanup';
        bash /cleanup.sh &&
        docker exec local-registry registry garbage-collect /etc/docker/registry/config.yml;
        sleep 86400;
      done"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.12"
          memory: 56M
