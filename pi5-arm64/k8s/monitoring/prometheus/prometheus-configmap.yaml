apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "prometheus.rules"

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets:
              - localhost:9090

      - job_name: nginx-ingress
        metrics_path: /metrics
        static_configs:
          - targets:
              - nginx-ingress.ingress.svc.cluster.local:10254