apiVersion: v1
kind: Namespace
metadata:
  name: webtest

---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  namespace: webtest
  labels:
    app: nginx
spec:
  containers:
  - name: nginx
    image: nginx:latest
    ports:
    - containerPort: 80
      name: "nginx-http"

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: webtest
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx
  namespace: webtest
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: public
  rules:
  - host: nginx-test.xboy.me
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-service
            port:
              number: 80