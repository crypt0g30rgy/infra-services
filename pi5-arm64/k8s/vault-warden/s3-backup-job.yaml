#   AWS_SECRET_ACCESS_KEY: "QeVbommASfG+2atIOHOVhtWGjpkXrFggIySYufl1"
#   AWS_REGION: "eu-west-1"
#   S3_BUCKET: "secrets-and-backups"
#   RETENTION_DAYS: "14"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vaultwarden-backup-script
  namespace: vaultwarden
data:
  backup.sh: |
        #!/usr/bin/env bash
        set -euo pipefail

        TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")

        WORKDIR="/tmp/backup"
        mkdir -p "${WORKDIR}"

        DB_BACKUP="vaultwarden-db-${TIMESTAMP}.sql.gz"
        DATA_BACKUP="vaultwarden-data-${TIMESTAMP}.tar.gz"


        echo "[1/8] PostgreSQL backup"

        DATABASE_URL="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres.vaultwarden.svc.cluster.local:5432/${POSTGRES_DB}"

        export PGPASSWORD="${POSTGRES_PASSWORD}"

        pg_dump \
          --dbname="${DATABASE_URL}" \
          -F c \
          | gzip > "${WORKDIR}/${DB_BACKUP}"


        echo "[2/8] Vaultwarden data backup"

        tar \
          -czf "${WORKDIR}/${DATA_BACKUP}" \
          -C /data .


        echo "[3/8] Creating checksums"

        sha256sum \
          "${WORKDIR}/${DB_BACKUP}" \
          > "${WORKDIR}/${DB_BACKUP}.sha256"


        sha256sum \
          "${WORKDIR}/${DATA_BACKUP}" \
          > "${WORKDIR}/${DATA_BACKUP}.sha256"



        echo "[4/8] Uploading database backup"

        aws s3 cp \
          "${WORKDIR}/${DB_BACKUP}" \
          "s3://${S3_BUCKET}/${S3_PATH}/${DB_BACKUP}"

        aws s3 cp \
          "${WORKDIR}/${DB_BACKUP}.sha256" \
          "s3://${S3_BUCKET}/${S3_PATH}/${DB_BACKUP}.sha256"



        echo "[5/8] Uploading data backup"

        aws s3 cp \
          "${WORKDIR}/${DATA_BACKUP}" \
          "s3://${S3_BUCKET}/${S3_PATH}/${DATA_BACKUP}"

        aws s3 cp \
          "${WORKDIR}/${DATA_BACKUP}.sha256" \
          "s3://${S3_BUCKET}/${S3_PATH}/${DATA_BACKUP}.sha256"



        echo "[6/8] Retention cleanup"


        for PREFIX in vaultwarden-db vaultwarden-data; do

          mapfile -t FILES < <(
            aws s3api list-objects-v2 \
              --bucket "${S3_BUCKET}" \
              --prefix "${S3_PATH}/${PREFIX}-" \
              --query 'Contents[].Key' \
              --output text \
              | grep -E "\.(gz)$" \
              | sort -r
          )


          COUNT=0

          for FILE in "${FILES[@]}"; do

            COUNT=$((COUNT+1))


            # Always keep newest two
            if [ "${COUNT}" -le 2 ]; then
              continue
            fi


            FILE_DATE=$(echo "${FILE}" \
              | sed -E 's/.*-[0-9]{8}T[0-9]{6}Z.*/\0/')


            OBJECT_DATE=$(aws s3api head-object \
              --bucket "${S3_BUCKET}" \
              --key "${FILE}" \
              --query LastModified \
              --output text)


            OBJECT_TS=$(date -d "${OBJECT_DATE}" +%s)

            LIMIT=$(date -d "-${RETENTION_DAYS} days" +%s)


            if [ "${OBJECT_TS}" -lt "${LIMIT}" ]; then

              echo "Deleting ${FILE}"

              aws s3 rm \
                "s3://${S3_BUCKET}/${FILE}"

              aws s3 rm \
                "s3://${S3_BUCKET}/${FILE}.sha256" \
                || true

            fi

          done

        done



        echo "[7/8] Cleanup"

        rm -rf "${WORKDIR}"


        echo "[8/8] Backup completed successfully"

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vaultwarden-backup
  namespace: vaultwarden
spec:
  schedule: "0 0 * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: backup
            image: ghcr.io/your-org/vaultwarden-backup:1.0.0
            imagePullPolicy: IfNotPresent
            command:
              - /scripts/backup.sh
            env:
            # aws s3 configuration
            - name: AWS_REGION
              value: "eu-west-1"
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: s3-backup-env
                  key: S3_BUCKET
            - name: S3_PATH
              value: "vault-auto-backups"
            - name: RETENTION_DAYS
              value: "14"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-backup-env
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-backup-env
                  key: AWS_SECRET_ACCESS_KEY
              # postgress configuration
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-secret
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres.vaultwarden.svc.cluster.local:5432/$(POSTGRES_DB)"

            volumeMounts:
            - name: vaultwarden-data
              mountPath: /data
              readOnly: true
            - name: backup-script
              mountPath: /scripts
              readOnly: true

          volumes:
          - name: vaultwarden-data
            persistentVolumeClaim:
              claimName: vaultwarden-data
          - name: backup-script
            configMap:
              name: vaultwarden-backup-script
              defaultMode: 0755