apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      serviceAccountName: jenkins

      containers:
      - name: jenkins
        image: jenkins/jenkins:2.572

        ports:
        - containerPort: 8080
        # - containerPort: 50000

        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"

        volumeMounts:
        - name: jenkins-home
          mountPath: /var/jenkins_home

      volumes:
      - name: jenkins-home
        persistentVolumeClaim:
          claimName: jenkins-home