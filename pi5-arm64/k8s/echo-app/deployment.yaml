apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
      - name: echo
        image: kennethreitz/httpbin:latest
        # args:
        #   - "-text=hello from microk8s"
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: default
spec:
  selector:
    app: echo
  ports:
    - port: 80
      targetPort: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echo                       # Name of the Ingress object
  namespace: default               # Namespace where the Ingress is created
  annotations:
    # Rewrite the URL path before sending it to the backend service.
    # This is commonly used when the Ingress path differs from the service path.
    nginx.ingress.kubernetes.io/rewrite-target: /

spec:
  # The IngressClass to use; ensures this Ingress is handled by the correct controller.
  # Make sure your NGINX ingress controller defines an IngressClass named 'public'.
  ingressClassName: public

  rules:
  - host: echo.example.me           # Public hostname that clients will access
    http:
      paths:
      - path: /                     # URL path this rule matches
        pathType: Prefix            # Path matching type: Prefix = match any URL that starts with this path
        backend:
          service:
            name: echo              # Target Kubernetes Service to forward requests to
            port:
              number: 80            # Port on the Service to forward traffic to