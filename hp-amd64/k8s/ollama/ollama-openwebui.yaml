apiVersion: v1
kind: Namespace
metadata:
  name: ai

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-pvc
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama

  template:
    metadata:
      labels:
        app: ollama

    spec:
      runtimeClassName: nvidia

      containers:
        - name: ollama
          image: ollama/ollama:latest

          ports:
            - containerPort: 11434

          env:
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"

            - name: OLLAMA_NUM_PARALLEL
              value: "1"

            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"

            - name: OLLAMA_FLASH_ATTENTION
              value: "0"

          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama

          resources:
            limits:
              nvidia.com/gpu: 1

      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai
spec:
  selector:
    app: ollama

  ports:
    - port: 11434
      targetPort: 11434

  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: ai
spec:
  replicas: 1

  selector:
    matchLabels:
      app: open-webui

  template:
    metadata:
      labels:
        app: open-webui

    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main

          ports:
            - containerPort: 8080

          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"

            - name: WEBUI_SECRET_KEY
              value: "change-this-secret"

          volumeMounts:
            - name: openwebui-data
              mountPath: /app/backend/data

      volumes:
        - name: openwebui-data
          persistentVolumeClaim:
            claimName: openwebui-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: ai
spec:
  selector:
    app: open-webui

  ports:
    - port: 80
      targetPort: 8080

  type: LoadBalancer