version: "3.8"

networks:
  internal:
    external: true

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    mem_limit: 512m
    mem_reservation: 128m
    memswap_limit: 1g
    cpus: "0.5"
    cpuset: "0"
    networks:
      - internal

volumes:
  prometheus_data:
