apiVersion: v1
kind: ConfigMap
metadata:
  name: vaultwarden-config
  namespace: vaultwarden
data:
  DOMAIN: "https://vault.example.com"
  SIGNUPS_ALLOWED: "false"
  INVITATIONS_ALLOWED: "false"
  SIGNUPS_DOMAINS_WHITELIST: ""
  SHOW_PASSWORD_HINT: "false"
  LOG_LEVEL: "info"
  WEBSOCKET_ENABLED: "true"
  WEBSOCKET_ADDRESS: "0.0.0.0"
  WEBSOCKET_PORT: "3012"
  ROCKET_PORT: "80"
  DATABASE_URL: "postgres://vaultwarden:CHANGE_ME@postgres.vaultwarden.svc.cluster.local:5432/vaultwarden"
  SMTP_HOST: "smtp.mail.example.com"
  SMTP_FROM: "vault@example.com"
  SMTP_PORT: "587"
  SMTP_SSL: "false"
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  ADMIN_TOKEN: ""
  DISABLE_ADMIN_TOKEN: "false"
  ENABLE_IPV4_ONLY: "false"
  LOG_FILE: ""
  METRICS: "true"
  ENV_FILE: ""
  DATA_FOLDER: "/data"
