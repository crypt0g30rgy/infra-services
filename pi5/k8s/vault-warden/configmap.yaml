apiVersion: v1
kind: ConfigMap
metadata:
  name: vaultwarden-config
  namespace: vaultwarden
data:
  # Public URL of your Vaultwarden instance
  DOMAIN: "https://secret-vault.mypasswords.com"

  # Production security best practice: disable new signups
  SIGNUPS_ALLOWED: "false"

  # Enable WebSocket real-time sync
  WEBSOCKET_ENABLED: "true"

  # Optional but recommended for monitoring
  METRICS: "true"

  # Always keep /data as default storage path
  DATA_FOLDER: "/data"